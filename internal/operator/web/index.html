<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>avairy</title>
<!-- Vendored, same-origin (no CDN): markdown + sanitize + syntax highlighting (incl. diff), #23 -->
<link rel="stylesheet" href="/operator/ui/vendor/hljs-dark.min.css">
<script src="/operator/ui/vendor/highlight.min.js"></script>
<script src="/operator/ui/vendor/diff.min.js"></script>
<script src="/operator/ui/vendor/purify.min.js"></script>
<script src="/operator/ui/vendor/marked.min.js"></script>
<style>
  :root{
    --bg:#0f1012; --panel:#17181b; --panel2:#1d1f23; --ink:#e9eaec; --muted:#8b919b;
    --line:#2a2d33; --accent:#6d63ff; --accent-ink:#fff; --bubble:#1d1f23;
    --ok:#22c55e; --warn:#f59e0b; --err:#ef4444; --idle:#6b7280; --chip:#23262b;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f6f7f9; --panel:#fff; --panel2:#f0f1f4; --ink:#1c1e22; --muted:#6b7280;
      --line:#e4e6ea; --accent:#5b54e6; --bubble:#f0f1f4; --chip:#eceef2; }
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--ink);
    font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  .app{display:grid;grid-template-columns:240px minmax(0,1fr) 288px;grid-template-rows:auto minmax(0,1fr);height:100vh}
  /* header */
  header{grid-column:1/4;display:flex;align-items:center;gap:12px;padding:0 16px;height:48px;
    border-bottom:1px solid var(--line);background:var(--panel)}
  header .brand{font-weight:700;letter-spacing:.2px}
  header .sub{color:var(--muted);font-size:12px}
  header .spacer{flex:1}
  .pill{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:6px;
    background:var(--chip);padding:4px 10px;border-radius:999px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--idle);flex:none}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.work{background:var(--ok)}
  .dot.off{background:var(--idle);opacity:.45} .dot.blocked{background:var(--err)}
  .dot.sleeping{background:#39a0ed;opacity:.7}
  .tok{font-family:ui-monospace,Menlo,monospace;cursor:pointer}
  /* sidebars */
  aside{overflow-y:auto;padding:16px 14px;background:var(--panel);min-height:0}
  aside.left{border-right:1px solid var(--line)}
  aside.right{border-left:1px solid var(--line)}
  aside h3{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);
    margin:20px 0 10px;display:flex;align-items:center;gap:6px}
  aside h3:first-child{margin-top:0}
  .agent{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px}
  .agent:hover{background:var(--panel2)}
  .agent .name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .agent .st{margin-left:auto;font-size:11px;color:var(--muted)}
  .agent .spend{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
  .task{padding:8px 10px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;font-size:13px}
  .task .t{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .task .meta{color:var(--muted);font-size:11px;margin-top:2px}
  .empty{color:var(--muted);font-size:13px;padding:2px 8px}
  /* chat column */
  main{display:flex;flex-direction:column;min-width:0;min-height:0}
  #log{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth}
  .wrap{max-width:820px;margin:0 auto;padding:20px 24px}
  .empty-chat{height:100%;display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:14px}
  .row{display:flex;margin:12px 0;gap:10px}
  .row.me{justify-content:flex-end}
  .row.sys{justify-content:center;margin:14px 0}
  .msg{max-width:80%;padding:10px 14px;border-radius:16px;background:var(--bubble);
    border:1px solid var(--line);white-space:pre-wrap;overflow-wrap:anywhere;line-height:1.5}
  .row.me .msg{background:var(--accent);color:var(--accent-ink);border-color:transparent}
  .who{font-size:11px;font-weight:700;margin-bottom:3px;opacity:.95}
  .to{font-weight:500;opacity:.7}
  .mention{font-weight:700;background:rgba(125,130,180,.20);border-radius:4px;padding:0 3px}
  .row.me .mention{background:rgba(0,0,0,.22);color:#fff}
  /* rendered markdown inside a bubble */
  .msg.md{white-space:normal}
  .msg.md > .who{margin-bottom:5px}
  .md p{margin:.4em 0} .md p:first-child{margin-top:0} .md p:last-child{margin-bottom:0}
  .md ul,.md ol{margin:.4em 0;padding-left:1.3em} .md li{margin:.15em 0}
  .md h1,.md h2,.md h3{margin:.5em 0 .3em;font-size:1.05em;line-height:1.3}
  .md code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.92em;
    background:rgba(127,127,127,.18);padding:.1em .35em;border-radius:5px}
  .md pre{background:#0d1117;border:1px solid var(--line);border-radius:10px;padding:10px 12px;
    overflow-x:auto;margin:.5em 0}
  .md pre code{background:none;padding:0;font-size:12.5px;line-height:1.45}
  .md a{color:var(--accent)} .md blockquote{margin:.4em 0;padding-left:.8em;border-left:3px solid var(--line);color:var(--muted)}
  .md table{border-collapse:collapse;margin:.5em 0} .md th,.md td{border:1px solid var(--line);padding:3px 8px}
  .tool .msg{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;
    color:var(--muted);background:transparent;border-style:dashed}
  .err .msg{border-color:var(--err);color:var(--err)}
  .think .msg{color:var(--muted);background:transparent;border-style:dashed;font-style:italic;font-size:13px}
  .syspill{font-size:12px;color:var(--muted);background:var(--chip);padding:4px 14px;border-radius:999px}
  /* composer */
  .composer{border-top:1px solid var(--line);background:var(--panel);padding:12px 0 14px}
  .composer-inner{max-width:820px;margin:0 auto;padding:0 24px}
  .inputbar{display:flex;align-items:flex-end;gap:8px;background:var(--panel2);
    border:1px solid var(--line);border-radius:18px;padding:6px 6px 6px 8px}
  .inputbar:focus-within{border-color:var(--accent)}
  select,button{font:inherit;color:inherit}
  #to{border:0;background:transparent;color:var(--muted);padding:8px 6px;border-radius:12px;
    cursor:pointer;max-width:140px;align-self:center}
  #to:hover{background:var(--chip)}
  textarea{flex:1;border:0;outline:0;background:transparent;resize:none;color:var(--ink);
    line-height:1.5;padding:9px 4px;min-height:24px;max-height:180px;font:inherit}
  textarea::placeholder{color:var(--muted)}
  button{cursor:pointer;border:1px solid transparent;border-radius:12px;padding:8px 14px;font-weight:600}
  .send{background:var(--accent);color:var(--accent-ink);align-self:flex-end}
  .send:hover{filter:brightness(1.08)}
  .stop{background:transparent;border-color:var(--line);color:var(--muted);align-self:center}
  .stop:hover{background:var(--chip);color:var(--ink)}
  button:disabled{opacity:.5;cursor:default}
  .hint{max-width:820px;margin:7px auto 0;padding:0 26px;color:var(--muted);font-size:11.5px}
  /* approval/conflict cards */
  .card{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;font-size:13px;background:var(--panel2)}
  .card .head{font-weight:600;margin-bottom:2px;overflow-wrap:anywhere}
  .card .meta{color:var(--muted);font-size:11.5px;margin-bottom:8px;overflow-wrap:anywhere}
  .card .acts{display:flex;gap:6px;flex-wrap:wrap}
  .card .acts button{padding:5px 10px;font-size:12px;font-weight:600}
  .card .acts .yes{background:var(--accent);color:var(--accent-ink)}
  .card .acts .alt{background:var(--chip);border-color:var(--line)}
  .card .acts .no{background:transparent;border-color:var(--line);color:var(--muted)}
  .card select{width:100%;margin-bottom:7px;padding:6px;border-radius:8px;background:var(--panel);
    border:1px solid var(--line);color:var(--ink);font-size:12px}
  .count{min-width:18px;text-align:center;background:var(--accent);color:var(--accent-ink);
    border-radius:999px;font-size:10px;font-weight:700;padding:1px 6px}
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="brand">avairy</span>
    <span class="sub">operator console</span>
    <span class="spacer"></span>
    <span class="pill" id="cost">$0.00</span>
    <span class="pill tok" id="token" title="click to copy enroll token" style="display:none"></span>
    <span class="pill"><span class="dot" id="conn"></span><span id="connTxt">connecting…</span></span>
  </header>

  <aside class="left">
    <h3>Fleet</h3>
    <div id="fleet"><div class="empty">no agents yet</div></div>
    <h3>Tasks</h3>
    <div id="tasks"><div class="empty">no tasks</div></div>
    <h3>Notes</h3>
    <div id="notes"><div class="empty">blackboard empty</div></div>
  </aside>

  <main>
    <div id="log"><div class="wrap" id="logwrap"><div class="empty-chat" id="emptyChat">No messages yet — type below to talk to the fleet.</div></div></div>
    <div class="composer">
      <div class="composer-inner">
        <div class="inputbar">
          <select id="to" title="recipient"></select>
          <textarea id="msg" rows="1" placeholder="Message the fleet…"></textarea>
          <button class="send" id="send">Send</button>
          <button class="stop" id="stop" title="interrupt running agents">Stop</button>
        </div>
      </div>
      <div class="hint">Enter to send · Shift+Enter newline · <code>/commit &lt;msg&gt;</code> · <code>/consult [@node] [family]</code> · <code>/end &lt;id&gt;</code></div>
    </div>
  </main>

  <aside class="right">
    <h3>Approvals <span class="count" id="apCount" style="display:none">0</span></h3>
    <div id="approvals"><div class="empty">none pending</div></div>
    <h3>Conflicts <span class="count" id="cfCount" style="display:none">0</span></h3>
    <div id="conflicts"><div class="empty">none</div></div>
  </aside>
</div>

<script>
const token = new URLSearchParams(location.search).get("token") || "";
const authq = token ? "?token=" + encodeURIComponent(token) : "";
const hdr = token ? {"Authorization":"Bearer "+token} : {};

const agents = new Map();   // id -> status
const agentCost = {};       // id -> spend USD (#26)
const agentOver = new Set(); // ids over budget (#26)
let cost = 0;
const $ = id => document.getElementById(id);

async function post(path, body){
  try{ await fetch(path, {method:"POST", headers:{...hdr,"Content-Type":"application/json"}, body:JSON.stringify(body||{})}); }
  catch(e){}
}
async function getState(){
  const r = await fetch("/operator/state", {headers:hdr});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}

// ---- transcript (mirrors the TUI's apply) ----
const logwrap = $("logwrap");
function atBottom(){ const l=$("log"); return l.scrollHeight - l.scrollTop - l.clientHeight < 90; }
function toBottom(){ const l=$("log"); l.scrollTop = l.scrollHeight; }
function colorFor(name){ let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))%360; return `hsl(${h} 60% 62%)`; }
// highlightMentions wraps @<agent> tokens (known agents, or @all/@everyone) in a styled span so
// mentions pop in any message. Walks text nodes only — skips code/pre/links — to avoid touching
// code or false-matching @media/@param; restricting to known ids guards prose too.
function highlightMentions(root, me){
  const skip={CODE:1,PRE:1,A:1}, re=/@([A-Za-z0-9_.-]+)/g, hasRe=/@[A-Za-z0-9_.-]/;
  const known=id=>agents.has(id)||id==="all"||id==="everyone";
  const walker=document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(n){
      for(let p=n.parentNode; p && p!==root.parentNode; p=p.parentNode){ if(p.nodeType===1 && skip[p.tagName]) return NodeFilter.FILTER_REJECT; }
      return hasRe.test(n.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
    }
  });
  const nodes=[]; let n; while(n=walker.nextNode()) nodes.push(n);
  for(const t of nodes){
    const s=t.nodeValue; let last=0, mm, any=false; const frag=document.createDocumentFragment();
    re.lastIndex=0;
    while(mm=re.exec(s)){
      if(!known(mm[1])) continue;
      any=true;
      if(mm.index>last) frag.appendChild(document.createTextNode(s.slice(last,mm.index)));
      const span=document.createElement("span"); span.className="mention"; span.textContent=mm[0];
      // In a "me" bubble (accent background) the per-agent hue clashes — let it inherit the white
      // ink and lean on the chip instead; elsewhere tint known agents with their own color.
      if(!me && agents.has(mm[1])) span.style.color=colorFor(mm[1]);
      frag.appendChild(span); last=mm.index+mm[0].length;
    }
    if(!any) continue;
    if(last<s.length) frag.appendChild(document.createTextNode(s.slice(last)));
    t.parentNode.replaceChild(frag, t);
  }
}
function clearEmpty(){ const e=$("emptyChat"); if(e) e.remove(); }

// mdInto renders markdown (with syntax highlighting incl. diff) into el, sanitized. Falls back to
// plain text if the vendored libs didn't load — content is never lost. (#23)
function mdInto(el, text){
  if(window.marked && window.DOMPurify){
    el.innerHTML = DOMPurify.sanitize(marked.parse(text, {breaks:true, gfm:true}));
    if(window.hljs) el.querySelectorAll("pre code").forEach(b=>{ try{ hljs.highlightElement(b); }catch(e){} });
  } else {
    el.textContent = text;
  }
}
function bubble(author, to, text, cls, md){
  clearEmpty();
  const stick = atBottom();
  const row = document.createElement("div");
  row.className = "row " + (cls||"");
  const me = author === "human";
  if(me) row.classList.add("me");
  const m = document.createElement("div"); m.className="msg"+(md?" md":"");
  const label = me ? "you" : author;
  if(label){
    const w=document.createElement("div"); w.className="who"; w.textContent=label;
    if(!me) w.style.color = colorFor(author||"");
    if(to){ const t=document.createElement("span"); t.className="to"; t.textContent=" → "+to; w.appendChild(t); }
    m.appendChild(w);
  }
  const b=document.createElement("div");
  if(md) mdInto(b, text); else b.textContent=text;
  highlightMentions(b, me);
  m.appendChild(b);
  row.appendChild(m); logwrap.appendChild(row);
  if(stick) toBottom();
}
function sysline(text){
  clearEmpty();
  const stick=atBottom();
  const row=document.createElement("div"); row.className="row sys";
  const p=document.createElement("span"); p.className="syspill"; p.textContent=text;
  row.appendChild(p); logwrap.appendChild(row); if(stick) toBottom();
}
function addrStr(to){ if(!to) return ""; if(to.Kind==="broadcast") return "all"; if(to.Kind==="team") return "team"; return to.Kind+":"+to.Value; }
// Mirror of agent.ToolSummary: tool name + its identifying arg (command / file / pattern …), so
// the transcript shows "Bash: go test ./…" rather than a bare "Bash".
function toolSummary(t){
  if(!t) return "tool";
  const inp = t.Input || {};
  for(const k of ["command","cmd","file_path","filePath","path","pattern","query","url"]){
    const v = inp[k];
    if(typeof v==="string" && v){
      let s = v; const nl = v.indexOf("\n");
      if(nl>=0) s = v.slice(0,nl).trim()+" …";
      if(s.length>120) s = s.slice(0,120)+"…";
      return t.Name+": "+s;
    }
  }
  return t.Name || "tool";
}
function setStatus(id, st){ if(!id||id==="human") return; agents.set(id, st); renderFleet(); }

function applyRecord(rec){
  const d = rec.data || {};
  switch(rec.kind){
    case "message":
      if(d.Interrupt) return;
      bubble(d.From, addrStr(d.To), d.Body, "", true); break;
    case "agent_event":
      if(d.Type==="text"){ setStatus(rec.actor,"working"); bubble(rec.actor, null, d.Text, "", true); }
      else if(d.Type==="reasoning"){ const t=(d.Text||"").trim(); if(t){ setStatus(rec.actor,"working"); bubble(rec.actor, null, "💭 "+t, "think"); } }
      else if(d.Type==="tool_use"){ setStatus(rec.actor,"working"); bubble(rec.actor, null, "⚙ "+toolSummary(d.Tool), "tool"); }
      else if(d.Type==="turn_done"){ setStatus(rec.actor,"idle"); if(d.Usage){ cost += d.Usage.CostUSD||0; $("cost").textContent="$"+cost.toFixed(2); agentCost[rec.actor]=(agentCost[rec.actor]||0)+(d.Usage.CostUSD||0); renderFleet(); } }
      else if(d.Type==="error"){ bubble(rec.actor, null, "⚠ "+d.Text, "err"); }
      break;
    case "handover": sysline(`${d.Claimant} claimed ${d.ID} — “${d.Title}”`); break;
    case "system": applySystem(rec.actor, d); break;
  }
}
function applySystem(actor, d){
  switch(d.event){
    case "report_status":
      if(actor){ const s=d.status; setStatus(actor,(s==="blocked"||s==="low_confidence")?"blocked":(s==="done"?"idle":"working")); }
      break;
    case "node_offline": if(agents.has(actor)) setStatus(actor,"offline"); break;
    case "node_online": if(agents.get(actor)==="offline") setStatus(actor,"idle"); break;
    case "conflict_raised": sysline(`conflict on ${d.path} needs resolution`); break;
    case "consult_opened": if(d.id) sysline(`opened ${d.id} (ephemeral) — @${d.id} to talk · /end ${d.id}`); break;
    case "consult_closed": if(d.id) sysline(`closed ${d.id} — gone`); break;
    case "response_claimed": if(d.thread) sysline(`✋ ${actor} claimed the team request ${d.thread} — others stand down`); break;
    case "agent_sleeping": if(agents.has(actor)){ setStatus(actor,"sleeping"); sysline(`${actor} went to sleep (idle) — a message wakes it`); } break;
    case "agent_awake": if(agents.get(actor)==="sleeping") setStatus(actor,"idle"); break;
    case "budget_exceeded": {
      const spent=(d.spent||0).toFixed(2);
      if(d.scope==="agent" && d.agent){ agentOver.add(d.agent); renderFleet(); sysline(`⚠ ${d.agent} exceeded its budget ($${spent}) — interrupted`); }
      else sysline(`⚠ fleet exceeded its budget ($${spent}) — all agents interrupted`);
      break;
    }
  }
}

// ---- side panels ----
function dotClass(st){ return st==="working"?"work":st==="blocked"?"blocked":st==="offline"?"off":st==="sleeping"?"sleeping":st==="idle"?"ok":""; }
function renderFleet(){
  const el=$("fleet");
  if(agents.size===0){ el.innerHTML='<div class="empty">no agents yet</div>'; return; }
  el.innerHTML="";
  [...agents.keys()].sort().forEach(id=>{
    const st=agents.get(id);
    const d=document.createElement("div"); d.className="agent";
    const spend=(agentCost[id]||0).toFixed(2);
    const over=agentOver.has(id);
    d.innerHTML=`<span class="dot ${dotClass(st)}"></span><span class="name"></span><span class="st">${st}</span><span class="spend"${over?' style="color:#e5c07b"':''}>$${spend}${over?" ⚠":""}</span>`;
    const n=d.querySelector(".name"); n.textContent=id; n.style.color=colorFor(id);
    el.appendChild(d);
  });
}
function renderTasks(tasks){
  const el=$("tasks");
  if(!tasks||tasks.length===0){ el.innerHTML='<div class="empty">no tasks</div>'; return; }
  el.innerHTML="";
  tasks.forEach(t=>{
    const d=document.createElement("div"); d.className="task";
    const claim=t.Claimant?(" · "+t.Claimant):"";
    d.innerHTML=`<div class="t"></div><div class="meta">${t.State}${claim}</div>`;
    d.querySelector(".t").textContent=t.Title; el.appendChild(d);
  });
}
function renderNotes(notes){
  const el=$("notes");
  if(!notes||notes.length===0){ el.innerHTML='<div class="empty">blackboard empty</div>'; return; }
  el.innerHTML="";
  notes.forEach(n=>{
    const d=document.createElement("div"); d.className="task";
    d.innerHTML=`<div class="t"></div><div class="meta"></div>`;
    d.querySelector(".t").textContent=n.Key;
    d.querySelector(".meta").textContent=(n.Author?n.Author+" · ":"")+n.Text;
    el.appendChild(d);
  });
}
function agentOptions(sel, includeBroadcast){
  const cur=sel.value;
  sel.innerHTML="";
  if(includeBroadcast){ const o=document.createElement("option"); o.value=""; o.textContent="broadcast"; sel.appendChild(o); }
  [...agents.keys()].sort().forEach(id=>{ const o=document.createElement("option"); o.value=id; o.textContent="@"+id; sel.appendChild(o); });
  if([...sel.options].some(o=>o.value===cur)) sel.value=cur;
}
function renderApprovals(items){
  const el=$("approvals"), c=$("apCount");
  c.style.display = items&&items.length ? "inline-block":"none"; if(items) c.textContent=items.length;
  if(!items||items.length===0){ el.innerHTML='<div class="empty">none pending</div>'; return; }
  el.innerHTML="";
  items.forEach(a=>{
    const d=document.createElement("div"); d.className="card";
    d.innerHTML=`<div class="head"></div><div class="meta"></div>
      <div class="acts"><button class="yes" data-d="allow">Allow</button>
        <button class="alt" data-d="allow_for_session">Session</button>
        <button class="no" data-d="deny">Deny</button></div>`;
    d.querySelector(".head").textContent=`${a.agentId} · ${a.kind}`;
    d.querySelector(".meta").textContent=a.summary + (a.reason?(" — "+a.reason):"");
    d.querySelectorAll("button").forEach(b=>b.onclick=()=>post("/operator/approval",{ID:a.id,Decision:b.dataset.d}).then(refresh));
    el.appendChild(d);
  });
}
function renderConflicts(items){
  const el=$("conflicts"), c=$("cfCount");
  c.style.display = items&&items.length ? "inline-block":"none"; if(items) c.textContent=items.length;
  if(!items||items.length===0){ el.innerHTML='<div class="empty">none</div>'; return; }
  el.innerHTML="";
  items.forEach(cf=>{
    const d=document.createElement("div"); d.className="card";
    if(cf.source==="node-startup"){
      // Per-node startup conflict: full resync / resolve, with an overview toggle.
      d.innerHTML=`<div class="head"></div><div class="meta">startup conflict — local diverged while offline</div>
        <pre class="ov" style="display:none;white-space:pre-wrap;font-size:11.5px;color:var(--muted);margin:0 0 7px;font-family:ui-monospace,Menlo,monospace"></pre>
        <div class="acts"><button class="yes" data-d="resync">Resync</button>
          <button class="alt" data-d="resolve">Resolve</button>
          <button class="no" data-d="overview">Overview</button></div>`;
      d.querySelector(".head").textContent="node "+cf.path;
      d.querySelector(".ov").textContent=cf.detail||"";
      d.querySelectorAll(".acts button").forEach(b=>b.onclick=()=>{
        if(b.dataset.d==="overview"){ const ov=d.querySelector(".ov"); ov.style.display=ov.style.display==="none"?"block":"none"; return; }
        post("/operator/conflict",{ID:cf.id,Decision:b.dataset.d,Target:""}).then(refresh);
      });
      el.appendChild(d); return;
    }
    d.innerHTML=`<div class="head"></div><div class="meta"></div><select></select>
      <div class="acts"><button class="yes" data-d="mine">I'll resolve</button>
        <button class="alt" data-d="delegate">Delegate</button></div>`;
    d.querySelector(".head").textContent=cf.path;
    d.querySelector(".meta").textContent=`hub v${cf.hubVersion} · ${cf.source}`+(cf.detail?(" — "+cf.detail):"");
    const sel=d.querySelector("select"); agentOptions(sel,false);
    if(agents.size===0){ const o=document.createElement("option"); o.value=""; o.textContent="(no agents)"; sel.appendChild(o); }
    d.querySelectorAll(".acts button").forEach(b=>b.onclick=()=>
      post("/operator/conflict",{ID:cf.id,Decision:b.dataset.d,Target:b.dataset.d==="delegate"?sel.value:""}).then(refresh));
    el.appendChild(d);
  });
}

async function refresh(){
  let st; try{ st=await getState(); }catch(e){ return; }
  (st.roster||[]).forEach(id=>{ if(!agents.has(id)) agents.set(id,"idle"); });
  renderFleet(); renderTasks(st.tasks); renderNotes(st.notes); renderApprovals(st.approvals); renderConflicts(st.conflicts);
  agentOptions($("to"), true);
  const t=$("token");
  if(st.control && st.control.token){
    t.style.display="inline-flex";
    t.textContent="enroll "+st.control.token.slice(0,8)+"…";
    t.onclick=()=>navigator.clipboard && navigator.clipboard.writeText(st.control.token);
  } else { t.style.display="none"; }
}

// ---- composer ----
// parseConsult turns "/consult" args into {Target, Family}: "@linux codex" → linux/codex,
// "codex" → core/codex, "" → core/default. Mirrors the TUI's leading-@ semantics.
function parseConsult(a){
  let target="", family=a;
  if(a.startsWith("@")){ const sp=a.indexOf(" ");
    if(sp>=0){ target=a.slice(1,sp); family=a.slice(sp+1).trim(); } else { target=a.slice(1); family=""; } }
  return {Target:target, Family:family};
}
function send(){
  const ta=$("msg"); const text=ta.value.trim(); if(!text) return;
  if(text.startsWith("/commit")){ const m=text.slice(7).trim();
    if(m) post("/operator/commit",{Message:m}).then(()=>sysline("commit requested: "+m));
    ta.value=""; grow(); return; }
  if(text.startsWith("/consult")){
    post("/operator/consult", parseConsult(text.slice(8).trim())); // result shows via the journal
    ta.value=""; grow(); return; }
  if(text.startsWith("/end")){
    post("/operator/close",{ID:text.slice(4).trim().replace(/^@/,"")});
    ta.value=""; grow(); return; }
  // A leading "@<id> " in the text addresses that agent (parsed server-side, same as the TUI).
  post("/operator/inject",{Target:$("to").value, Body:text});
  ta.value=""; grow();
}
function grow(){ const ta=$("msg"); ta.style.height="auto"; ta.style.height=Math.min(ta.scrollHeight,180)+"px"; }
$("send").onclick=send;
$("stop").onclick=()=>post("/operator/interrupt",{});
$("msg").addEventListener("input", grow);
$("msg").addEventListener("keydown", e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }});

// ---- live stream ----
function connect(){
  const es=new EventSource("/operator/stream"+authq);
  const live=()=>{ $("conn").className="dot ok"; $("connTxt").textContent="live"; };
  es.onmessage=e=>{ try{ applyRecord(JSON.parse(e.data)); }catch(err){} };
  es.addEventListener("ready", live);
  es.onopen=live;
  es.onerror=()=>{ $("conn").className="dot warn"; $("connTxt").textContent="reconnecting…"; };
}

connect();
refresh();
setInterval(refresh, 2000);
</script>
